name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty complexipy

      - name: Lint with ruff
        run: ruff check

      - name: Check formatting with ruff
        run: ruff format --check

      - name: Type check with ty
        run: ty check

      - name: Complexity check with complexipy
        run: complexipy src/ --max-complexity-allowed 15 --exclude src/searxng_bm25_reranker/_vendor
